<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kavin's Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Login screen ============================================ -->
  <main class="login hidden" id="login-screen">
    <div class="login-card">
      <div class="login-kicker">Kavin's Log</div>
      <h1 class="login-title">Sign <em>in</em></h1>
      <form id="login-form" class="login-form" autocomplete="on">
        <label class="field">
          <span>Email</span>
          <input type="email" id="email" required autocomplete="email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="login-btn" id="login-submit">Enter</button>
        <div class="login-error hidden" id="login-error"></div>
      </form>
    </div>
  </main>

  <!-- App screen =============================================== -->
  <main class="page hidden" id="app-screen">

    <header class="masthead">
      <div class="dateline" id="dateline">—</div>
      <h1 class="wordmark">
        <span class="amp">K</span>avin's <em>Log</em>
      </h1>
      <div class="meta">
        <span id="day-meta">Day 1</span>
        <span class="sep">·</span>
        <span>Phase III — Bulking</span>
        <span class="sep">·</span>
        <button class="signout" id="signout">sign out</button>
      </div>
      <div class="sync-state" id="sync-state"></div>
    </header>

    <hr class="rule heavy" />

    <section class="protein-block">
      <div class="protein-fig">
        <span class="num" id="protein-current">0</span><span class="den">of <span id="protein-target">180</span>g</span>
      </div>
      <div class="protein-bar">
        <div class="bar-fill" id="bar-fill"></div>
      </div>
      <div class="protein-foot">
        <span><em id="pct">0%</em> of target</span>
        <span id="meals-done-label">0 of 8 meals</span>
        <span class="streak"><span id="streak-count">0</span> day streak</span>
      </div>
    </section>

    <hr class="rule" />

    <section class="rotation hidden" id="rotation">
      <div class="kicker">Today's rotation</div>
      <ul class="rot-list" id="rot-list"></ul>
      <hr class="rule" />
    </section>

    <section class="log" id="log"></section>

    <footer class="page-foot">
      <button class="ghost" id="reset-day">reset today</button>
      <span class="dot">·</span>
      <button class="ghost" id="show-history">see history</button>
    </footer>

  </main>

  <!-- History modal ============================================ -->
  <div class="modal hidden" id="history-modal" role="dialog" aria-modal="true">
    <div class="modal-inner">
      <div class="modal-head">
        <div>
          <div class="kicker">The record</div>
          <h2 class="modal-title">Your <em>history</em></h2>
        </div>
        <button class="ghost" id="close-history">close</button>
      </div>

      <div class="hist-stats">
        <div class="hist-stat">
          <div class="hist-stat-num" id="hist-best">0</div>
          <div class="hist-stat-lbl">longest streak</div>
        </div>
        <div class="hist-stat">
          <div class="hist-stat-num" id="hist-avg">0g</div>
          <div class="hist-stat-lbl">avg protein, 30d</div>
        </div>
        <div class="hist-stat">
          <div class="hist-stat-num" id="hist-hit">0</div>
          <div class="hist-stat-lbl">days hit target</div>
        </div>
      </div>

      <div class="kicker hist-section-kicker">Last 90 days</div>
      <div class="heatmap" id="heatmap"></div>

      <div class="kicker hist-section-kicker">Last 30 days</div>
      <svg class="chart" id="chart" viewBox="0 0 600 160" preserveAspectRatio="none"></svg>

      <div class="kicker hist-section-kicker" id="insights-kicker">Patterns</div>
      <div class="insights" id="insights"></div>
    </div>
  </div>

  <div id="boot-error" style="display:none;padding:24px;max-width:600px;margin:40px auto;font-family:monospace;background:#fff5e6;border:1px solid #e9a23b;color:#3a2a10;line-height:1.5;font-size:13px;white-space:pre-wrap;"></div>

  <script>
    // Catch any error so we never get a silent white screen
    window.__showBootError = function(msg) {
      var box = document.getElementById('boot-error');
      if (!box) return;
      box.style.display = 'block';
      box.textContent = msg;
      // Hide the empty login/app frames so the error is what's visible
      var l = document.getElementById('login-screen');
      var a = document.getElementById('app-screen');
      if (l) l.style.display = 'none';
      if (a) a.style.display = 'none';
    };
    window.addEventListener('error', function(e) {
      window.__showBootError('Error: ' + (e.message || e.error || 'unknown') +
        (e.filename ? '\n\nin ' + e.filename + ':' + e.lineno : ''));
    });
    window.addEventListener('unhandledrejection', function(e) {
      window.__showBootError('Async error: ' + (e.reason && (e.reason.message || e.reason)));
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"
    onerror="window.__showBootError('Failed to load Supabase library from CDN. Check your network.')"></script>
  <script src="config.js"
    onerror="window.__showBootError('Failed to load config.js')"></script>
  <script src="app.js"
    onerror="window.__showBootError('Failed to load app.js')"></script>
</body>
</html>
